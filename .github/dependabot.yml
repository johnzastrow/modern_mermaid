version: 2
updates:
  # Application dependencies (pnpm is handled by the npm ecosystem)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Collapse routine minor/patch bumps into a single PR to cut noise;
      # major bumps still arrive as individual, reviewable PRs.
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly

  # Base images referenced by the Dockerfile
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
