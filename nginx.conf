server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # --- Security headers (defense in depth for a self-hosted static app) ---
    # NOTE: nginx drops all inherited `add_header` directives inside any block
    # that declares its own. To keep these headers on every response, the
    # cache-control locations below use `expires` (which does NOT reset them)
    # rather than `add_header Cache-Control`.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), gyroscope=(), microphone=(), usb=()" always;
    # Strict CSP: no external origins. 'unsafe-inline' is required only for
    # styles (inline style attributes + Mermaid-injected <style>); scripts are
    # 'self' only because the service worker registers via an external script.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'" always;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache content-hashed build assets (expires keeps security headers)
    location /assets/ {
        expires 1y;
    }

    # Never cache the entry document or the service worker
    location = /index.html { expires -1; }
    location = /sw.js       { expires -1; }

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml application/manifest+json;
}
