services:
  modern-mermaid:
    build:
      context: .
    image: modern-mermaid:local
    container_name: modern-mermaid
    ports:
      - "8080:8080"
    restart: unless-stopped
    # --- Runtime hardening ---
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 30s
      timeout: 3s
      retries: 3
